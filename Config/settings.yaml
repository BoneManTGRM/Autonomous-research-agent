# ================================================================
# Autonomous Research Agent - Full Configuration
# Maxed-out YAML for Streamlit UI + Background Worker + CoreAgent
# ================================================================


# ------------------------------------------------
# STORAGE / MEMORY
# ------------------------------------------------
# Canonical shared memory file (Streamlit UI + engine_worker)
memory_file: logs/sessions/ara_memory.json

vector_memory_path: logs/vector_store/vector_memory.jsonl

# Checkpoint system for long autonomous runs
checkpoint_dir: logs/checkpoints
checkpoint_every_cycles: 25
checkpoint_every_minutes: 15


# ------------------------------------------------
# RUNTIME + WATCHDOG / AUTONOMY
# ------------------------------------------------
# Watchdog will ping memory every X minutes
watchdog_interval_minutes: 3

# Hard upper bound on cycles per single run before soft-reset
max_cycles_per_run: 2000000

# Maximum points sent to charts in UI (avoid RangeError)
max_history_points: 1000


# ------------------------------------------------
# DEFAULT DOMAIN PRESETS
# ------------------------------------------------
default_domain: general   # general, longevity, math, biology, ai_safety, custom

default_source_controls:
  web: true
  pubmed: false
  semantic: false
  pdf: true
  biomarkers: false

default_goal: >
  Research and summarize Reparodynamics, analyze RYE and TGRM behavior,
  compare against similar frameworks like MAPE-K, cybernetics, resilience,
  and complex adaptive systems, and propose refinements.

# These are used directly by engine_worker.build_goal_and_domain()
# when WORKER_GOAL / WORKER_DOMAIN are not set.
default_worker_goal: >
  Autonomous long-run Reparodynamics research, testing the TGRM loop,
  RYE stability, efficiency trends, and self-repair behavior under
  long time budgets.

default_worker_domain: general


# ------------------------------------------------
# TOOL CONFIGURATION
# ------------------------------------------------
tools:
  browser:
    enabled: true
    provider: tavily
    max_results: 5
  code_sandbox:
    enabled: true
    max_runtime_ms: 400
  data_connectors:
    enabled: true
    auto_table_detect: true
  pubmed:
    enabled: true
    max_results: 5
  semantic_scholar:
    enabled: true
    max_results: 5
  pdf:
    enabled: true


# ------------------------------------------------
# STREAMLIT UI DEFAULTS
# ------------------------------------------------
ui:
  swarm_default_enabled: false
  swarm_default_size: 8
  multiagent_default_enabled: false
  biomarker_mode_default: false
  default_run_mode: "Manual (finite cycles)"


# ------------------------------------------------
# WORKER DEFAULTS (background engine)
# ------------------------------------------------
worker:
  enabled: true

  # These mirror default_worker_goal/default_worker_domain above
  # but can be used by CoreAgent or other components if needed.
  default_goal: >
    Autonomous long-run Reparodynamics research, testing the TGRM loop,
    RYE stability, efficiency trends, and self-repair behavior under
    long time budgets.

  default_domain: general

  runtime_profiles:
    1_hour:
      label: "1 Hour Run"
      default_minutes: 60
      max_minutes: 70
    8_hours:
      label: "8 Hour Run"
      default_minutes: 480
      max_minutes: 520
    24_hours:
      label: "24 Hour Run"
      default_minutes: 1440
      max_minutes: 1500
    1_week:
      label: "1 Week Run"
      default_minutes: 10080      # 7 days * 24 * 60
      max_minutes: 10500
    1_month:
      label: "1 Month Run"
      default_minutes: 43200      # 30 days * 24 * 60
      max_minutes: 44000
    90_days:
      label: "90 Day Run"
      default_minutes: 129600
      max_minutes: 130000
    forever:
      label: "Infinite Run"
      max_minutes: null

  # For segmentation (Meta-controller / Option C)
  meta:
    enabled: true
    max_segments: 6
    default_total_minutes: 60   # overridden by env or UI
    smoothing_factor: 0.6       # exponential smoothing for recent RYE
    min_segment_minutes: 5

  # Optional hints for back-to-back worker runs (env still controls real behavior)
  back_to_back:
    enabled_default: false
    default_repeats: 1
    max_repeats: 10


# ------------------------------------------------
# ENERGY MODEL / RYE MODEL
# ------------------------------------------------
energy_model:
  base_energy: 1.0
  swarm_energy_multiplier: 1.8
  critic_energy_multiplier: 1.3
  researcher_energy_multiplier: 1.0
  theorist_energy_multiplier: 1.2
  integrator_energy_multiplier: 1.1
  explorer_energy_multiplier: 1.3

rye:
  smoothing_window: 10
  collapse_threshold: 0.01
  equilibrium_expected: 0.60
  coherence_plateau_expected: 0.82


# ------------------------------------------------
# SEARCH ENERGY AND TAVILY BUDGET
# ------------------------------------------------
search_energy:
  # Global mode for search control:
  #   static = respect per-role defaults only
  #   dynamic = Exploration -> Compression -> Verification based on signals
  mode: dynamic

  # Per-role multipliers applied on top of any base search intensity
  role_multipliers:
    researcher: 1.0
    critic: 0.6
    explorer: 1.2
    integrator: 0.5
    planner: 0.5
    synthesis: 0.5
    generic_agent: 0.8

  # Phase 1: Exploration
  exploration:
    enabled: true
    min_cycles: 3          # minimum cycles to stay in high search mode
    max_cycles: 6          # soft limit before considering compression
    base_intensity: 1.0    # 1.0 = current search behavior

  # Phase 2: Compression (use more memory, less Tavily)
  compression:
    enabled: true
    novelty_drop_threshold: 0.35     # trigger when novelty stays below this
    min_rye_window: 5                # how many cycles to check for novelty
    intensity_factor: 0.5            # 50 percent of exploration search load

  # Phase 3: Verification (search only when needed)
  verification:
    enabled: true
    contradiction_density_trigger: 0.25   # above this, allow extra checking
    hypothesis_uncertainty_trigger: 0.6   # 0 to 1 scale, higher = more uncertain
    intensity_factor: 0.3                # 30 percent of exploration search load

  # Hard and soft Tavily budget hints, for gating and reporting
  tavily_budget:
    enabled: true
    estimated_credits_per_hour: 450    # based on your real 32-agent usage
    soft_hourly_cap: 600               # above this, reduce search intensity
    hard_hourly_cap: 1000              # above this, block non-critical searches
    soft_daily_cap: 5000               # warn and compress search once hit
    hard_daily_cap: 10000              # block non-critical searches if exceeded
    log_credit_usage: true             # allow tools to log estimated credits


# ------------------------------------------------
# LOGGING + SYSTEM INFO
# ------------------------------------------------
logging:
  level: INFO
  store_cycles: true
  store_summaries: true

system:
  identify: "Reparodynamics Autonomous Agent v3.0"
  version: 3.0
  description: >
    A long-run self-repairing autonomous research system using the TGRM loop,
    RYE metrics, swarm intelligence, meta-control, and multi-agent reasoning.


# ------------------------------------------------
# SAFETY LIMITS (same for UI + Worker)
# ------------------------------------------------
safety:
  max_swarm_agents: 32
  max_ui_cycles: 200
  max_pdf_size_mb: 20
  max_query_length: 4000
  max_memory_notes: 100000
