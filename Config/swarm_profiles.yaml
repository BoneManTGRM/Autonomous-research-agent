# config/swarm_profiles.yaml
# Swarm configuration profiles for the Autonomous Research Agent
#
# These profiles are read by the swarm orchestration layer and the MetaAgent.
# They do not change runtime profiles or max_minutes. They only provide:
#   • role selections and weights
#   • coordination and integration hints
#   • domain specific swarm behaviors
#   • stability and RYE aware adjustments
#
# All profiles are optional. If this file is missing or a profile is not
# referenced, the engine should fall back to preset level defaults.

version: "2025-11-27-swarm-max"

defaults:
  # Hard ceilings. The engine should still respect its own safety limits.
  max_agents_global: 32
  min_agents_swarm: 2

  # Standard coordination options
  coordination_modes:
    - round_robin
    - weighted
    - priority
    - cascade
    - hybrid

  # Standard consensus models
  consensus_models:
    - majority
    - weighted_vote
    - best_candidate
    - quorum

  # Common role names known to the engine
  base_roles:
    researcher: true
    critic: true
    planner: true
    synthesizer: true
    explorer: true
    integrator: true

  # Shared stability driven resizing hints
  stability_resize_hints:
    shrink_if:
      unstable_labels:
        - unstable
        - fragile
        - chaotic
      max_delta_agents: 2
    expand_if:
      robust_labels:
        - robust
        - high_stability
      min_stability_score: 0.75
      max_delta_agents: 2

# ---------------------------------------------------------------------------
# GENERAL SWARM PROFILES
# ---------------------------------------------------------------------------

profiles:

  general_light:
    label: "General light swarm"
    domain: "general"
    description: >
      Small balanced swarm for broad exploratory research. Good default
      for most users when enabling swarm for the first time.
    enabled: true
    allowed_modes:
      - swarm
    default_agents: 4
    max_agents: 12
    coordination_mode: round_robin
    consensus_model: weighted_vote
    integration_frequency_cycles: 1

    roles:
      - name: researcher
        weight: 1.0
        mission: "Gather core facts and mechanisms for the current goal."
      - name: critic
        weight: 1.0
        mission: "Attack weak points and overclaims in the notes."
      - name: planner
        weight: 0.8
        mission: "Convert open questions into high value next actions."
      - name: synthesizer
        weight: 1.0
        mission: "Summarize and compress findings into human usable notes."

    learning_hints:
      focus: "balanced"
      use_learning_bursts: true
      preferred_burst_profile: "balanced"
      min_cycles_between_bursts: 15
      max_bursts_per_100_cycles: 5

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: true
      expand_on_robust: true

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 3
      emphasis:
        mechanisms: true
        interventions: true
        patterns: true

  general_heavy:
    label: "General heavy swarm"
    domain: "general"
    description: >
      Larger swarm for intensive general discovery campaigns. Intended
      for well provisioned deployments with high compute budgets.
    enabled: true
    allowed_modes:
      - swarm
    default_agents: 8
    max_agents: 24
    coordination_mode: hybrid
    consensus_model: weighted_vote
    integration_frequency_cycles: 1

    roles:
      - name: researcher
        weight: 1.4
        mission: "Primary literature and data ingestion."
      - name: critic
        weight: 1.2
        mission: "Aggressive error and hype detection."
      - name: planner
        weight: 1.0
        mission: "Plan next experiments, queries, and simulations."
      - name: synthesizer
        weight: 1.0
        mission: "Build coherent narratives and tables."
      - name: explorer
        weight: 0.9
        mission: "Search for cross domain analogies and surprises."
      - name: integrator
        weight: 1.3
        mission: "Reconcile contradictions and maintain equilibrium."

    learning_hints:
      focus: "intensive_general"
      use_learning_bursts: true
      preferred_burst_profile: "aggressive"
      min_cycles_between_bursts: 12
      max_bursts_per_100_cycles: 8
      reuse_best_equilibrium_labels: true

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: true
      expand_on_robust: true

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 4
      emphasis:
        mechanisms: true
        interventions: true
        patterns: true
        predictions: true

# ---------------------------------------------------------------------------
# LONGEVITY AND BIOMARKER SWARM PROFILES
# ---------------------------------------------------------------------------

  longevity_core5:
    label: "Longevity core 5 swarm"
    domain: "longevity"
    description: >
      Five role longevity swarm specializing in mitochondria, epigenetics,
      senescence, proteostasis, and systems level stack design.
    enabled: true
    allowed_modes:
      - swarm
    default_agents: 5
    max_agents: 16
    coordination_mode: weighted
    consensus_model: weighted_vote
    integration_frequency_cycles: 1

    roles:
      - name: mitochondria_metabolism_specialist
        inherits_from: researcher
        weight: 1.3
        focus:
          - NAD+
          - mitophagy
          - OXPHOS
          - mitochondrial_biogenesis
      - name: dna_epigenetic_repair_specialist
        inherits_from: researcher
        weight: 1.3
        focus:
          - DNA_repair
          - sirtuins
          - partial_reprogramming
          - epigenetic_drift
      - name: senescence_inflammation_specialist
        inherits_from: researcher
        weight: 1.2
        focus:
          - senolytics
          - SASP
          - inflammaging
          - immune_clearance
      - name: proteostasis_autophagy_specialist
        inherits_from: researcher
        weight: 1.1
        focus:
          - autophagy
          - proteostasis
          - chaperones
          - unfolded_protein_response
      - name: systems_integrator_and_planner
        inherits_from: integrator
        weight: 1.4
        focus:
          - stack_design
          - RYE_tradeoffs
          - equilibrium_windows

    biomarker_focus:
      enabled: true
      prioritize_panels:
        - core_aging
        - organ_function
        - inflammation
        - metabolic
      require_numeric_effect_size: true
      min_effect_size_for_candidate: 0.10
      min_biomarkers_with_positive_shift: 3

    learning_hints:
      focus: "biomarker_driven"
      use_learning_bursts: true
      preferred_burst_profile: "balanced"
      min_cycles_between_bursts: 10
      max_bursts_per_100_cycles: 10
      biomarker_trigger:
        trigger_if_few_positive_shifts: 2
        lookback_cycles: 30

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: true
      expand_on_robust: true

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 4
      emphasis:
        interventions: true
        treatments: true
        biomarker_shift: true
        mechanisms: true

  longevity_clinical_heavy:
    label: "Longevity clinical heavy swarm"
    domain: "longevity"
    description: >
      Expanded swarm emphasizing clinical evidence grading and stack
      design for long horizon modeling runs. Intended for high compute
      environments and long RYE tracked experiments.
    enabled: true
    allowed_modes:
      - swarm
    default_agents: 10
    max_agents: 28
    coordination_mode: hybrid
    consensus_model: weighted_vote
    integration_frequency_cycles: 1

    roles:
      - name: clinical_researcher
        inherits_from: researcher
        weight: 1.4
        focus:
          - clinical_trial
          - randomized_controlled
          - meta_analysis
      - name: mechanistic_researcher
        inherits_from: researcher
        weight: 1.2
        focus:
          - pathways
          - cellular_mechanisms
      - name: biomarker_modeler
        inherits_from: researcher
        weight: 1.1
        focus:
          - longitudinal_biomarkers
          - effect_size_estimation
      - name: safety_critic
        inherits_from: critic
        weight: 1.3
        focus:
          - adverse_events
          - toxicity_signals
          - unrealistic_effects
      - name: methodology_critic
        inherits_from: critic
        weight: 1.2
        focus:
          - confounders
          - biases
          - underpowered_studies
      - name: protocol_planner
        inherits_from: planner
        weight: 1.0
        focus:
          - follow_up_queries
          - comparison_trials
      - name: systems_synthesizer
        inherits_from: synthesizer
        weight: 1.0
        focus:
          - cross_trial_comparison
          - stack_level_view
      - name: longevity_explorer
        inherits_from: explorer
        weight: 0.9
        focus:
          - adjacent_fields
          - unexpected_interventions
      - name: equilibrium_integrator
        inherits_from: integrator
        weight: 1.4
        focus:
          - equilibrium_detection
          - RYE_plateaus

    biomarker_focus:
      enabled: true
      prioritize_panels:
        - core_aging
        - inflammation
        - metabolic
        - lipids
        - hormones
      require_numeric_effect_size: true
      call_out_unrealistic_changes: true

    learning_hints:
      focus: "long_run_longevity"
      use_learning_bursts: true
      preferred_burst_profile: "aggressive"
      min_cycles_between_bursts: 15
      max_bursts_per_100_cycles: 10
      reuse_best_biomarker_panels: true
      reuse_best_swarm_contracts: true

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: true
      expand_on_robust: true

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 5
      emphasis:
        interventions: true
        treatments: true
        biomarker_shift: true
        prediction: true

# ---------------------------------------------------------------------------
# MATH AND THEORY SWARM PROFILES
# ---------------------------------------------------------------------------

  math_precision:
    label: "Math precision swarm"
    domain: "math"
    description: >
      Small high precision swarm tuned for definitions, theorems, and
      proof sketch refinement. Focused on coherence and rigor.
    enabled: true
    allowed_modes:
      - swarm
    default_agents: 3
    max_agents: 8
    coordination_mode: round_robin
    consensus_model: majority
    integration_frequency_cycles: 1

    roles:
      - name: formalizer
        inherits_from: researcher
        weight: 1.2
        focus:
          - definitions
          - axioms
          - formal_structures
      - name: proof_critic
        inherits_from: critic
        weight: 1.4
        focus:
          - logical_gaps
          - invalid_inferences
          - unstated_assumptions
      - name: theory_integrator
        inherits_from: integrator
        weight: 1.3
        focus:
          - unifying_theories
          - mapping_to_existing_frameworks

    learning_hints:
      focus: "precision"
      use_learning_bursts: true
      preferred_burst_profile: "balanced"
      min_cycles_between_bursts: 20
      max_bursts_per_100_cycles: 6

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: true
      expand_on_robust: true

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 3
      emphasis:
        mathematical_structure: true
        theorems: true
        conjectures: true

  math_expansive:
    label: "Math expansive swarm"
    domain: "math"
