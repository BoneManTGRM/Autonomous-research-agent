      - swarm
    default_agents: 6
    max_agents: 16
    coordination_mode: hybrid
    consensus_model: weighted_vote
    integration_frequency_cycles: 1

    roles:
      - name: formalizer
        inherits_from: researcher
        weight: 1.2
      - name: proof_critic
        inherits_from: critic
        weight: 1.4
      - name: theory_integrator
        inherits_from: integrator
        weight: 1.3
      - name: structure_explorer
        inherits_from: explorer
        weight: 1.0
        focus:
          - cross_domain_structures
          - analogies
      - name: experiment_planner
        inherits_from: planner
        weight: 0.9
        focus:
          - computational_experiments
          - toy_models

    learning_hints:
      focus: "framework_discovery"
      use_learning_bursts: true
      preferred_burst_profile: "balanced"
      min_cycles_between_bursts: 18
      max_bursts_per_100_cycles: 8
      reuse_best_equilibrium_labels: true

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: true
      expand_on_robust: true

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 4
      emphasis:
        frameworks: true
        mathematical_structure: true
        predictions: true

# ---------------------------------------------------------------------------
# SPECIAL PURPOSE SWARM PROFILES
# ---------------------------------------------------------------------------

  researcher_critic_pair:
    label: "Researcher plus critic pair"
    domain: "general"
    description: >
      Minimal two agent swarm that pairs a researcher with a critic for
      tightly coupled repair cycles. Suitable for small deployments.
    enabled: true
    allowed_modes:
      - swarm
      - multi
    default_agents: 2
    max_agents: 2
    coordination_mode: round_robin
    consensus_model: majority
    integration_frequency_cycles: 1

    roles:
      - name: researcher
        weight: 1.0
      - name: critic
        weight: 1.0

    learning_hints:
      focus: "pair_mode"
      use_learning_bursts: true
      preferred_burst_profile: "light"
      min_cycles_between_bursts: 12
      max_bursts_per_100_cycles: 4

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: false
      expand_on_robust: false

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 2

  exploratory_scout_swarm:
    label: "Exploratory scout swarm"
    domain: "general"
    description: >
      Light footprint swarm optimized for breadth first exploration of
      large topic spaces and adjacent domains.
    enabled: true
    allowed_modes:
      - swarm
    default_agents: 4
    max_agents: 10
    coordination_mode: round_robin
    consensus_model: best_candidate
    integration_frequency_cycles: 2

    roles:
      - name: explorer
        weight: 1.4
      - name: researcher
        weight: 1.0
      - name: critic
        weight: 0.8
      - name: synthesizer
        weight: 0.9

    learning_hints:
      focus: "exploration"
      use_learning_bursts: true
      preferred_burst_profile: "light"
      min_cycles_between_bursts: 10
      max_bursts_per_100_cycles: 6

    stability_hints:
      use_stability_kernel: true
      shrink_on_unstable: true
      expand_on_robust: true

    discovery_hints:
      multi_agent_voting: true
      minimum_role_agreement: 3
      emphasis:
        patterns: true
        analogies: true

