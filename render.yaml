services:
  # ---------------------------------------------------------
  # SINGLE SERVICE: STREAMLIT UI + ENGINE WORKER (started via start.sh)
  # ---------------------------------------------------------
  - type: web
    name: ara-autonomous-research-agent
    env: python
    plan: starter

    rootDir: .

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      chmod +x start.sh

    # start.sh must start engine_worker.py (background) + streamlit (foreground)
    startCommand: ./start.sh

    autoDeploy: true
    healthCheckPath: /

    # Persistent disk for queue + results + shared MemoryStore artifacts
    disk:
      name: ara-runs
      mountPath: /opt/render/project/src/runs
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

      # Shared runs dir (single source of truth)
      - key: ARA_RUNS_DIR
        value: /opt/render/project/src/runs

      # Make queue root explicit (avoids any ambiguity)
      - key: ARA_QUEUE_ROOT
        value: /opt/render/project/src/runs/queue

      # Run worker in queue mode
      - key: WORKER_QUEUE_MODE
        value: "1"

      # Browser / Tavily controls
      - key: ENABLE_TAVILY
        value: "1"
      - key: TAVILY_STUB_MODE
        value: "0"
      - key: DISABLE_WEB_SEARCH
        value: "0"
      - key: TAVILY_RPS
        value: "1.0"
      - key: BROWSER_CACHE_TTL_SECONDS
        value: "600"

      # Secrets
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
