services:
  # ---------------------------------------------------------
  # SINGLE SERVICE: STREAMLIT UI + ENGINE WORKER (watchdog keeps worker alive)
  # ---------------------------------------------------------
  - type: web
    name: ara-autonomous-research-agent
    env: python
    plan: starter
    numInstances: 1

    rootDir: .

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      chmod +x start.sh

    # Start Streamlit as usual, but also run a watchdog that restarts engine_worker.py if it dies
    startCommand: |
      set -euo pipefail

      echo "Boot: ensuring runs + queue directories exist"
      mkdir -p "${ARA_RUNS_DIR}" "${ARA_QUEUE_ROOT}"

      # Worker watchdog: if engine_worker.py crashes/exits, bring it back.
      (
        echo "[watchdog] started"
        # Give start.sh time to start the worker (prevents double-start in most cases)
        sleep 10
        while true; do
          if pgrep -f "agent/engine_worker.py" >/dev/null 2>&1; then
            sleep 5
          else
            echo "[watchdog] engine worker not running; starting..."
            python -u agent/engine_worker.py &
            sleep 5
          fi
        done
      ) &

      exec ./start.sh

    autoDeploy: true
    healthCheckPath: /

    # Persistent disk for queue + results + shared MemoryStore artifacts
    disk:
      name: ara-runs
      mountPath: /opt/render/project/src/runs
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PYTHONUNBUFFERED
        value: "1"

      # Shared runs dir (single source of truth)
      - key: ARA_RUNS_DIR
        value: /opt/render/project/src/runs

      # Make queue root explicit (avoids any ambiguity)
      - key: ARA_QUEUE_ROOT
        value: /opt/render/project/src/runs/queue

      # Run worker in queue mode
      - key: WORKER_QUEUE_MODE
        value: "1"

      # Browser / Tavily controls
      - key: ENABLE_TAVILY
        value: "1"
      - key: TAVILY_STUB_MODE
        value: "0"
      - key: DISABLE_WEB_SEARCH
        value: "0"
      - key: TAVILY_RPS
        value: "1.0"
      - key: BROWSER_CACHE_TTL_SECONDS
        value: "600"

      # Secrets
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
