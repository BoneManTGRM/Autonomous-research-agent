services:
  # ---------------------------------------------------------
  # STREAMLIT WEB UI SERVICE
  # ---------------------------------------------------------
  - type: web
    name: reparodynamics-autonomous-agent
    env: python
    plan: starter

    rootDir: .

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      chmod +x start.sh

    startCommand: ./start.sh

    autoDeploy: true
    healthCheckPath: /

    # Shared disk for queue + results
    disk:
      name: ara-runs
      mountPath: /opt/render/project/src/runs
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      # Shared correct queue path for Streamlit
      - key: ARA_RUNS_DIR
        value: /opt/render/project/src/runs

      # Browser / Tavily controls
      - key: ENABLE_TAVILY
        value: "1"
      - key: TAVILY_STUB_MODE
        value: "0"
      - key: DISABLE_WEB_SEARCH
        value: "0"
      # Optional: tune request rate and cache TTL for swarm runs
      - key: TAVILY_RPS
        value: "1.0"
      - key: BROWSER_CACHE_TTL_SECONDS
        value: "600"

      - key: OPENAI_API_KEY
        sync: false

      - key: TAVILY_API_KEY
        sync: false


  # ---------------------------------------------------------
  # ENGINE WORKER SERVICE (reads from queue, runs jobs)
  # ---------------------------------------------------------
  - type: worker
    name: reparodynamics-autonomous-agent-worker
    env: python
    plan: starter

    rootDir: .

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: python engine_worker.py

    autoDeploy: true

    # Shared disk for EXACT SAME run folders
    disk:
      name: ara-runs
      mountPath: /opt/render/project/src/runs
      sizeGB: 1

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      # Worker must see the same queue path
      - key: ARA_RUNS_DIR
        value: /opt/render/project/src/runs

      - key: WORKER_QUEUE_MODE
        value: "1"

      # Browser / Tavily controls (same as web service)
      - key: ENABLE_TAVILY
        value: "1"
      - key: TAVILY_STUB_MODE
        value: "0"
      - key: DISABLE_WEB_SEARCH
        value: "0"
      - key: TAVILY_RPS
        value: "1.0"
      - key: BROWSER_CACHE_TTL_SECONDS
        value: "600"

      - key: OPENAI_API_KEY
        sync: false

      - key: TAVILY_API_KEY
        sync: false
